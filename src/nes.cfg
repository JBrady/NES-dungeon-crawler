MEMORY {
    HEADER:   start = $0000, size = $0010, type = ro, file = %O, fill = yes;
    ZP:       start = $0000, size = $0100, type = rw, define = yes;
    OAMRAM:   start = $0200, size = $0100, type = rw, define = yes;
    QUEUERAM: start = $0300, size = $0040, type = rw, define = yes;
    AUDIORAM: start = $0340, size = $0080, type = rw, define = yes;
    RAM:      start = $03C0, size = $0440, type = rw, define = yes;
    PRG:      start = $8000, size = $8000, type = ro, file = %O, fill = yes;
    CHR:      start = $0000, size = $2000, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    HEADER:   load = HEADER,   type = ro;
    ZEROPAGE: load = ZP,       type = zp;
    OAM:      load = OAMRAM,   type = bss;
    QUEUE:    load = QUEUERAM, type = bss;
    AUDIORAM: load = AUDIORAM, type = bss;
    BSS:      load = RAM,      type = bss;
    CODE:     load = PRG,      type = ro;
    RODATA:   load = PRG,      type = ro;
    VECTORS:  load = PRG,      type = ro, start = $FFFA;
    CHR:      load = CHR,      type = ro;
}
